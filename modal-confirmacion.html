<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación - Dr. Luis Muñoz</title>

<!-- Google Tag Manager (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-549097550"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'AW-549097550');
</script>
<!-- End Google Tag Manager -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A2E4D;
    --sky: #4FB3D9;
    --teal: #1F9E8F;
    --white: #FFFFFF;
    --gray: #F7F9FB;
    --success: #27AE60;
    --text-dim: #5C7186;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
  }

  /* OVERLAY DE FONDO OSCURO */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(10, 46, 77, 0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  /* MODAL BOX */
  .modal-box {
    background: var(--white);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(10, 46, 77, 0.2);
    text-align: center;
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  @keyframes slideUp {
    from {
      transform: translateY(30px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* ICONO DE ÉXITO */
  .modal-icon {
    width: 80px;
    height: 80px;
    background: var(--success);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 10px 30px rgba(39, 174, 96, 0.2);
    animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }

  @keyframes scaleIn {
    from {
      transform: scale(0);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  .modal-icon svg {
    width: 44px;
    height: 44px;
    color: var(--white);
  }

  /* TEXTOS */
  .modal-title {
    font-family: 'Poppins', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .modal-title span {
    color: var(--teal);
  }

  .modal-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 28px;
    font-weight: 500;
  }

  /* INFORMACIÓN */
  .modal-info {
    background: var(--gray);
    border-left: 4px solid var(--teal);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 24px;
    text-align: left;
  }

  .modal-info-title {
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--teal);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .modal-info-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .modal-info-text strong {
    color: var(--navy);
    font-weight: 700;
  }

  /* BOTONES */
  .modal-buttons {
    display: flex;
    gap: 12px;
    flex-direction: column;
  }

  .modal-btn {
    padding: 14px 20px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .modal-btn-close {
    background: var(--sky);
    color: var(--navy);
    border: none;
  }

  .modal-btn-close:hover {
    background: #3EA8D4;
    transform: translateY(-2px);
  }

  /* CERRAR CON X */
  .modal-close-x {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: var(--gray);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--navy);
    font-size: 20px;
    font-weight: 700;
    transition: all 0.3s ease;
  }

  .modal-close-x:hover {
    background: var(--sky);
    transform: rotate(90deg);
  }

  @media (max-width: 480px) {
    .modal-box {
      padding: 30px 20px;
      max-width: 100%;
    }

    .modal-title {
      font-size: 20px;
    }

    .modal-icon {
      width: 70px;
      height: 70px;
    }

    .modal-icon svg {
      width: 38px;
      height: 38px;
    }
  }
</style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close-x" onclick="cerrarModal()">×</button>

    <!-- ICONO -->
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <!-- TÍTULO -->
    <h2 class="modal-title">¡Gracias por <span>contactarnos!</span></h2>

    <!-- SUBTÍTULO -->
    <p class="modal-subtitle">Tu solicitud fue registrada exitosamente. El Dr. Luis Muñoz se pondrá en contacto contigo pronto.</p>

    <!-- INFORMACIÓN -->
    <div class="modal-info">
      <div class="modal-info-title">📞 Próximo paso</div>
      <div class="modal-info-text">Recibirás un mensaje por <strong>WhatsApp en las próximas 24 horas</strong> para confirmar tu cita de valoración.</div>
    </div>

    <!-- BOTÓN -->
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-close" onclick="cerrarModal()">
        Entendido
      </button>
    </div>
  </div>
</div>

<script>
  // Función para registrar conversión en Google Ads
  function registrarConversion() {
    gtag('event', 'conversion', {
      'send_to': 'AW-549097550/mde6CPTXk8wcEM6g6oUC',
      'value': 1.0,
      'currency': 'USD'
    });
  }

  // Función para cerrar el modal (SIN registrar conversión)
  function cerrarModal() {
    const overlay = document.getElementById('modalOverlay');
    overlay.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => {
      overlay.remove();
    }, 300);
  }

  // Cerrar al hacer clic en el overlay (fondo oscuro)
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
      cerrarModal();
    }
  });

  // Cerrar con ESC
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const overlay = document.getElementById('modalOverlay');
      if (overlay) {
        cerrarModal();
      }
    }
  });

  // Agregar animación de fadeOut
  const style = document.createElement('style');
  style.textContent = `
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
